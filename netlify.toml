# Netlify configuration for Semaforo dashboard.

[build]
  publish = "dashboard/dist"
  command = "npm --prefix dashboard install && npm --prefix dashboard run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm --prefix dashboard run dev"
  targetPort = 5173
  port = 8888
  publish = "dashboard/public"
  framework = "#custom"
  autoLaunch = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
