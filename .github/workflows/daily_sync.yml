name: WhatsApp daily analysis

on:
  # 6:00 AM Mexico City during standard time. Adjust if you want another hour.
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Date to analyze in YYYY-MM-DD. Empty = yesterday."
        required: false
        default: ""

jobs:
  analyze-whatsapp:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create environment
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WA_ANALYSIS_MODEL=${{ vars.WA_ANALYSIS_MODEL || 'claude-haiku-4-5' }}
          EOF

      - name: Analyze WhatsApp messages
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/sync/wa_daily_analyzer.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/sync/wa_daily_analyzer.py
          fi

      - name: Clean environment
        if: always()
        run: rm -f .env
