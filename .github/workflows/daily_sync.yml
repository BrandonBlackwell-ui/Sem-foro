name: WhatsApp daily analysis

on:
  # Mexico City business-day checkpoints: 7:00, 11:30, 15:00, 18:30, 22:15.
  # Cron uses UTC; Mexico City is UTC-6.
  schedule:
    - cron: "0 13 * * *"
    - cron: "30 17 * * *"
    - cron: "0 21 * * *"
    - cron: "30 0 * * *"
    - cron: "15 4 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Date to analyze in YYYY-MM-DD. Empty = yesterday."
        required: false
        default: ""

jobs:
  analyze-whatsapp:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create environment
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL=${{ vars.OPENROUTER_MODEL || 'google/gemini-3.1-flash-lite' }}
          OPENROUTER_SITE_URL=https://github.com/BrandonBlackwell-ui/Sem-foro
          OPENROUTER_APP_NAME=Blackwell Semaforo
          MONDAY_API_KEY=${{ secrets.MONDAY_API_KEY }}
          MONDAY_TASKS_BOARD_ID=${{ vars.MONDAY_TASKS_BOARD_ID || '18418418634' }}
          MONDAY_TASKS_BOARD_NAME=${{ vars.MONDAY_TASKS_BOARD_NAME || 'WhatsApp Tasks' }}
          MONDAY_TASKS_STATUS_COLUMN_ID=${{ vars.MONDAY_TASKS_STATUS_COLUMN_ID || 'color_mm452en1' }}
          MONDAY_TASKS_DUE_DATE_COLUMN_ID=${{ vars.MONDAY_TASKS_DUE_DATE_COLUMN_ID || 'date_mm45ncq9' }}
          MONDAY_TASKS_RESPONSIBLE_COLUMN_ID=${{ vars.MONDAY_TASKS_RESPONSIBLE_COLUMN_ID || 'multiple_person_mm453tee' }}
          MONDAY_TASKS_WORK_TYPE_COLUMN_ID=${{ vars.MONDAY_TASKS_WORK_TYPE_COLUMN_ID || 'color_mm4513mj' }}
          MONDAY_TASKS_GROUP_COLUMN_ID=${{ vars.MONDAY_TASKS_GROUP_COLUMN_ID || 'color_mm4ecz6r' }}
          MONDAY_TASKS_CLIENT_COLUMN_ID=${{ vars.MONDAY_TASKS_CLIENT_COLUMN_ID }}
          EOF

      - name: Analyze WhatsApp messages
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/sync/wa_daily_analyzer.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/sync/wa_daily_analyzer.py --date "$(TZ=America/Mexico_City date +%F)"
          fi

      - name: Sync WhatsApp tasks to Monday
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/sync/wa_monday_tasks.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/sync/wa_monday_tasks.py --date "$(TZ=America/Mexico_City date +%F)"
          fi

      - name: Mirror Monday task state to Supabase
        run: python scripts/sync/wa_monday_to_supabase.py

      - name: Analyze account methodologies
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 13 * * *'
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/sync/account_methodology_analyzer.py --date "${{ github.event.inputs.date }}" --accounts maja,tello
          else
            python scripts/sync/account_methodology_analyzer.py --date "$(TZ=America/Mexico_City date +%F)" --accounts maja,tello
          fi

      - name: Clean environment
        if: always()
        run: rm -f .env
