name: Media Sheet CO sync

on:
  # Manual only. The dashboard now reads the public Google Sheet directly via
  # /api/media-publications; this mirror is useful only if we want Supabase as
  # a cached copy later.
  workflow_dispatch:

jobs:
  sync-media-sheet:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create environment
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          MEDIA_SHEET_ID=${{ vars.MEDIA_SHEET_ID || '1PAcofO80aMuTNdclclqCrKS-uij0S8iI' }}
          MEDIA_SHEET_GENERAL_GID=${{ vars.MEDIA_SHEET_GENERAL_GID || '905402375' }}
          EOF

      - name: Sync media Sheet to Supabase
        run: python scripts/sync/sync_media_sheet.py

      - name: Clean environment
        if: always()
        run: rm -f .env
