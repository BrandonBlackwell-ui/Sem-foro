[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Si alguien navega a /ask se redirige al endpoint de la función — opcional, así no hay que recordar /.netlify/functions/...
[[redirects]]
  from = "/ask"
  to = "/.netlify/functions/ask"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
